<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Draw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #444;
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">hover to paint &nbsp;·&nbsp; esc to clear</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // 8 states: 0 = unlit, 1-7 = rainbow colours
    const COLORS = [
      null,
      '#FF2D55',  // vivid rose-red
      '#FF7A00',  // vivid orange
      '#FFE600',  // vivid yellow
      '#39FF14',  // neon green
      '#00F5D4',  // electric cyan-teal
      '#3D7EFF',  // vivid blue
      '#BF00FF',  // vivid violet
    ];

    const SPACING = 65;
    const ACTIVE_R = 18;
    const INACTIVE_R = 10;
    const RING_R = 28;
    const HIT_R = RING_R;

    let dots = [];
    let cols = 0;
    let rows = 0;
    let lastHoveredId = -1;

    function buildGrid() {
      const W = canvas.width;
      const H = canvas.height;
      const newCols = Math.floor(W / SPACING);
      const newRows = Math.floor(H / SPACING);
      const offsetX = (W - (newCols - 1) * SPACING) / 2;
      const offsetY = (H - (newRows - 1) * SPACING) / 2;

      const oldDots = dots;
      const newDots = [];

      for (let r = 0; r < newRows; r++) {
        for (let c = 0; c < newCols; c++) {
          const id = r * newCols + c;
          // Preserve colour state for dots that existed at the same grid position
          const oldIndex = r * cols + c;
          const colorIndex = (c < cols && r < rows && oldDots[oldIndex])
            ? oldDots[oldIndex].colorIndex
            : 0;
          newDots.push({
            id,
            x: offsetX + c * SPACING,
            y: offsetY + r * SPACING,
            colorIndex,
          });
        }
      }

      dots = newDots;
      cols = newCols;
      rows = newRows;
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      buildGrid();
    }

    window.addEventListener('resize', resize);
    resize();

    // Mouse interaction
    window.addEventListener('mousemove', (e) => {
      const mx = e.clientX;
      const my = e.clientY;

      let closestDot = null;
      let closestDist = HIT_R;

      for (const dot of dots) {
        const dx = dot.x - mx;
        const dy = dot.y - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < closestDist) {
          closestDist = dist;
          closestDot = dot;
        }
      }

      if (closestDot && closestDot.id !== lastHoveredId) {
        lastHoveredId = closestDot.id;
        closestDot.colorIndex = (closestDot.colorIndex + 1) % COLORS.length;
      } else if (!closestDot) {
        lastHoveredId = -1;
      }
    });

    // Escape to clear
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        for (const dot of dots) dot.colorIndex = 0;
      }
    });

    // Draw loop
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const dot of dots) {
        const color = COLORS[dot.colorIndex];

        if (dot.colorIndex === 0) {
          // Inactive: dark ring + small centre dot
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, RING_R, 0, Math.PI * 2);
          ctx.fillStyle = '#1e1e1e';
          ctx.fill();

          ctx.beginPath();
          ctx.arc(dot.x, dot.y, INACTIVE_R, 0, Math.PI * 2);
          ctx.fillStyle = '#2e2e2e';
          ctx.fill();
        } else {
          // Active: glow + vivid filled circle
          ctx.shadowColor = color;
          ctx.shadowBlur = 20;

          ctx.beginPath();
          ctx.arc(dot.x, dot.y, ACTIVE_R, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();

          ctx.shadowBlur = 0;
        }
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
