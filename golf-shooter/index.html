<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Shooter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    #hint {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">← → move &nbsp;|&nbsp; SPACE jump &nbsp;|&nbsp; X shoot</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, GROUND_Y;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND_Y = Math.floor(H * 0.78);
}
resize();
window.addEventListener('resize', () => { resize(); initScene(); });

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyX' && !e.repeat) tryShoot();
  if (e.code === 'Space' && !e.repeat) tryJump();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Constants ───────────────────────────────────────────────────────────────
const GRAVITY = 0.55;
const PLAYER_SPEED = 4.5;
const JUMP_VY = -13;
const BULLET_SPEED = 11;
const GOLF_BALL_SPEED = 4;
const MAX_GOLFERS = 4;
const GOLFER_SPEED = 1.2;
const SHOOT_INTERVAL_MIN = 120; // frames
const SHOOT_INTERVAL_MAX = 240;
const PLAYER_MAX_HP = 5;
const CLAW_SPEED = 5;

// ─── Terrain ─────────────────────────────────────────────────────────────────
// Hills: array of {x, w, h} raised platforms on top of GROUND_Y
let hills = [];
let sandBunkers = [];
let trees = [];
let flags = [];
let clouds = [];

function initScene() {
  hills = [
    { x: W * 0.15, w: W * 0.18, h: 60 },
    { x: W * 0.62, w: W * 0.2,  h: 45 },
  ];
  sandBunkers = [
    { x: W * 0.38, w: 90, h: 22 },
    { x: W * 0.75, w: 70, h: 18 },
  ];
  trees = [
    { x: W * 0.08,  y: GROUND_Y - 20 },
    { x: W * 0.92,  y: GROUND_Y - 20 },
    { x: W * 0.52,  y: GROUND_Y - 55 },
  ];
  flags = [
    { x: W * 0.45, h: 70 },
    { x: W * 0.80, h: 60 },
  ];
  clouds = [
    { x: W * 0.1,  y: H * 0.12, r: 38, speed: 0.18 },
    { x: W * 0.45, y: H * 0.08, r: 50, speed: 0.12 },
    { x: W * 0.75, y: H * 0.15, r: 32, speed: 0.22 },
  ];
}
initScene();

// Returns the Y coordinate of the ground surface at position x
function groundAt(x) {
  for (const h of hills) {
    if (x >= h.x && x <= h.x + h.w) return GROUND_Y - h.h;
  }
  return GROUND_Y;
}

// ─── Game State ──────────────────────────────────────────────────────────────
let player, bullets, golfBalls, golfers, claws, score, gameOver, frame, spawnTimer;

function initGame() {
  player = {
    x: W * 0.12,
    y: GROUND_Y - 48,
    vx: 0, vy: 0,
    facing: 1, // 1=right, -1=left
    onGround: false,
    hp: PLAYER_MAX_HP,
    shootCooldown: 0,
    hitFlash: 0,
    walkFrame: 0,
  };
  bullets = [];
  golfBalls = [];
  golfers = [];
  claws = [];
  score = 0;
  gameOver = false;
  frame = 0;
  spawnTimer = 0;
  // Spawn initial golfers
  for (let i = 0; i < 3; i++) spawnGolfer();
}

function spawnGolfer() {
  const side = Math.random() < 0.5 ? -1 : 1;
  const x = side === 1 ? W + 20 : -20;
  const g = GROUND_Y;
  golfers.push({
    x,
    y: g - 44,
    vx: side === -1 ? GOLFER_SPEED : -GOLFER_SPEED,
    facing: side === -1 ? 1 : -1,
    state: 'patrol', // patrol | stunned | grabbed
    hp: 2,
    shootTimer: Math.floor(Math.random() * SHOOT_INTERVAL_MAX) + SHOOT_INTERVAL_MIN,
    hitFlash: 0,
    walkFrame: 0,
    color: randomGolferColor(),
  });
}

function randomGolferColor() {
  const palettes = [
    { shirt: '#e84393', pants: '#3b82f6', cap: '#facc15' },
    { shirt: '#22c55e', pants: '#7c3aed', cap: '#f97316' },
    { shirt: '#ef4444', pants: '#15803d', cap: '#fbbf24' },
    { shirt: '#0ea5e9', pants: '#92400e', cap: '#84cc16' },
    { shirt: '#d946ef', pants: '#1d4ed8', cap: '#fb923c' },
  ];
  return palettes[Math.floor(Math.random() * palettes.length)];
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function tryJump() {
  if (gameOver) return;
  if (player.onGround) {
    player.vy = JUMP_VY;
    player.onGround = false;
  }
}

function tryShoot() {
  if (gameOver) return;
  if (player.shootCooldown > 0) return;
  bullets.push({
    x: player.x + player.facing * 18,
    y: player.y - 22,
    vx: player.facing * BULLET_SPEED,
    vy: 0,
  });
  player.shootCooldown = 18;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (gameOver) return;
  frame++;

  // Player horizontal movement
  if (keys['ArrowLeft'])  { player.vx = -PLAYER_SPEED; player.facing = -1; }
  else if (keys['ArrowRight']) { player.vx = PLAYER_SPEED; player.facing = 1; }
  else player.vx = 0;

  // Walk animation
  if (player.vx !== 0) player.walkFrame += 0.18;

  // Physics
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  // Clamp to screen width
  player.x = Math.max(10, Math.min(W - 10, player.x));

  // Ground collision
  const pgnd = groundAt(player.x);
  if (player.y >= pgnd - 44) {
    player.y = pgnd - 44;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.hitFlash > 0) player.hitFlash--;

  // ── Bullets ──
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20;
  });

  // ── Golf Balls ──
  golfBalls = golfBalls.filter(gb => {
    gb.vy += GRAVITY * 0.4;
    gb.x += gb.vx;
    gb.y += gb.vy;
    // Hit player
    if (dist(gb.x, gb.y, player.x, player.y - 22) < 20) {
      player.hp--;
      player.hitFlash = 25;
      if (player.hp <= 0) { gameOver = true; hideHint(); }
      return false;
    }
    // Bounce off ground
    const gnd = groundAt(gb.x);
    if (gb.y >= gnd) return false;
    return gb.x > -40 && gb.x < W + 40;
  });

  // ── Golfer AI ──
  spawnTimer++;
  if (spawnTimer >= 180 && golfers.length < MAX_GOLFERS) {
    spawnGolfer();
    spawnTimer = 0;
  }

  golfers.forEach(g => {
    if (g.state === 'grabbed') return;
    if (g.state === 'stunned') {
      g.hitFlash = Math.max(0, g.hitFlash - 1);
      return;
    }

    // Patrol
    g.x += g.vx;
    g.walkFrame += 0.15;

    // Bounce off edges
    if (g.x < 20)  { g.x = 20;  g.vx =  GOLFER_SPEED; g.facing = 1; }
    if (g.x > W - 20) { g.x = W - 20; g.vx = -GOLFER_SPEED; g.facing = -1; }

    // Keep on ground
    const ggnd = GROUND_Y;
    g.y = ggnd - 44;

    // Shoot at player
    g.shootTimer--;
    if (g.shootTimer <= 0) {
      const dx = player.x - g.x;
      const dy = (player.y - 22) - (g.y - 22);
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < W * 0.65) {
        const speed = GOLF_BALL_SPEED;
        const t = d / speed;
        const vx = dx / t;
        const vy = dy / t - 0.5 * GRAVITY * 0.4 * t;
        golfBalls.push({ x: g.x + g.facing * 18, y: g.y - 22, vx, vy });
      }
      g.shootTimer = Math.floor(Math.random() * (SHOOT_INTERVAL_MAX - SHOOT_INTERVAL_MIN)) + SHOOT_INTERVAL_MIN;
    }
  });

  // ── Bullet vs Golfer Collision ──
  bullets.forEach((b, bi) => {
    golfers.forEach(g => {
      if (g.state !== 'patrol') return;
      if (dist(b.x, b.y, g.x, g.y - 22) < 22) {
        g.hp--;
        bullets.splice(bi, 1);
        if (g.hp <= 0) {
          g.state = 'stunned';
          g.hitFlash = 30;
          // Spawn claw
          claws.push({
            armX: g.x,
            armY: 0,
            targetY: g.y - 44,
            phase: 'descend', // descend | grab | ascend
            golferIdx: golfers.indexOf(g),
            grabY: 0,
            timer: 0,
          });
        } else {
          g.hitFlash = 15;
        }
      }
    });
  });

  // ── Claw Animation ──
  claws = claws.filter(cl => {
    const g = golfers[cl.golferIdx];
    if (!g) return false;

    if (cl.phase === 'descend') {
      cl.armY += CLAW_SPEED * 1.5;
      if (cl.armY >= g.y - 10) {
        cl.phase = 'grab';
        cl.timer = 20;
        g.state = 'grabbed';
        cl.grabY = cl.armY;
      }
    } else if (cl.phase === 'grab') {
      cl.timer--;
      if (cl.timer <= 0) {
        cl.phase = 'ascend';
        score++;
      }
    } else if (cl.phase === 'ascend') {
      cl.armY -= CLAW_SPEED * 1.8;
      if (g) g.y -= CLAW_SPEED * 1.8;
      if (cl.armY < -80) {
        // Remove golfer
        golfers.splice(cl.golferIdx, 1);
        // Update remaining claw golferIdx references
        claws.forEach(other => {
          if (other !== cl && other.golferIdx > cl.golferIdx) other.golferIdx--;
        });
        return false;
      }
    }
    return true;
  });

  // ── Clouds ──
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + 80) c.x = -80;
  });
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#5ec8f0');
  sky.addColorStop(1, '#c9ecff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Sun
  ctx.save();
  ctx.beginPath();
  ctx.arc(W * 0.88, H * 0.1, 42, 0, Math.PI * 2);
  ctx.fillStyle = '#fff176';
  ctx.fill();
  ctx.restore();

  // Clouds
  clouds.forEach(c => drawCloud(c.x, c.y, c.r));

  // ── Ground ──
  // Main fairway
  ctx.fillStyle = '#4ade80';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Darker green edge
  ctx.fillStyle = '#16a34a';
  ctx.fillRect(0, GROUND_Y, W, 8);

  // Hills
  hills.forEach(h => {
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.ellipse(h.x + h.w / 2, GROUND_Y, h.w / 2, h.h * 1.1, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#16a34a';
    ctx.beginPath();
    ctx.ellipse(h.x + h.w / 2, GROUND_Y - h.h + 5, h.w / 2, 6, 0, Math.PI, 0);
    ctx.fill();
  });

  // Sand bunkers
  sandBunkers.forEach(b => {
    ctx.fillStyle = '#fde68a';
    ctx.beginPath();
    ctx.ellipse(b.x + b.w / 2, GROUND_Y - 2, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // Trees
  trees.forEach(t => drawTree(t.x, t.y));

  // Flags
  flags.forEach(f => drawFlag(f.x, GROUND_Y - f.h, f.h));

  // Golf balls
  golfBalls.forEach(gb => {
    ctx.beginPath();
    ctx.arc(gb.x, gb.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.stroke();
    // dimple
    ctx.beginPath();
    ctx.arc(gb.x - 1, gb.y - 1, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ccc';
    ctx.fill();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  });

  // Golfers
  golfers.forEach(g => drawGolfer(g));

  // Player
  drawPlayer();

  // Claws
  claws.forEach(cl => {
    const g = golfers[cl.golferIdx];
    drawClaw(cl, g);
  });

  // HUD
  drawHUD();

  // Game over overlay
  if (gameOver) drawGameOver();
}

// ─── Drawing Helpers ──────────────────────────────────────────────────────────
function drawCloud(x, y, r) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.8, y + r * 0.1, r * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - r * 0.7, y + r * 0.1, r * 0.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.2, y - r * 0.4, r * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTree(x, y) {
  // Trunk
  ctx.fillStyle = '#92400e';
  ctx.fillRect(x - 5, y, 10, 30);
  // Canopy
  ctx.fillStyle = '#15803d';
  ctx.beginPath();
  ctx.arc(x, y - 5, 26, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#16a34a';
  ctx.beginPath();
  ctx.arc(x - 8, y - 12, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 8, y - 10, 16, 0, Math.PI * 2);
  ctx.fill();
}

function drawFlag(x, topY, h) {
  // Pole
  ctx.strokeStyle = '#9ca3af';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, GROUND_Y);
  ctx.lineTo(x, topY);
  ctx.stroke();
  // Flag (waving using sin)
  const wave = Math.sin(frame * 0.08) * 4;
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.moveTo(x, topY);
  ctx.lineTo(x + 22 + wave, topY + 8);
  ctx.lineTo(x + 20, topY + 18);
  ctx.closePath();
  ctx.fill();
  // Hole circle
  ctx.fillStyle = '#166534';
  ctx.beginPath();
  ctx.ellipse(x, GROUND_Y - 2, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayer() {
  const p = player;
  ctx.save();
  if (p.hitFlash > 0 && Math.floor(p.hitFlash / 3) % 2 === 0) {
    ctx.globalAlpha = 0.35;
  }
  ctx.translate(p.x, p.y);
  ctx.scale(p.facing, 1);

  const walk = Math.sin(p.walkFrame) * 8;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 44, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.strokeStyle = '#1e3a5f';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-6, 18);
  ctx.lineTo(-8 + walk, 44);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(6, 18);
  ctx.lineTo(8 - walk, 44);
  ctx.stroke();

  // Body
  ctx.fillStyle = '#1d4ed8';
  ctx.beginPath();
  ctx.roundRect(-14, -10, 28, 32, 6);
  ctx.fill();

  // Arms
  ctx.strokeStyle = '#93c5fd';
  ctx.lineWidth = 6;
  // Back arm
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(-20 - walk * 0.5, 20);
  ctx.stroke();
  // Gun arm (front)
  ctx.strokeStyle = '#bfdbfe';
  ctx.beginPath();
  ctx.moveTo(12, -2);
  ctx.lineTo(28, -4);
  ctx.stroke();

  // Gun
  ctx.fillStyle = '#374151';
  ctx.fillRect(22, -8, 18, 7);
  ctx.fillStyle = '#111827';
  ctx.fillRect(36, -10, 6, 11);

  // Head
  ctx.fillStyle = '#fcd34d';
  ctx.beginPath();
  ctx.arc(0, -20, 14, 0, Math.PI * 2);
  ctx.fill();

  // Helmet/hat
  ctx.fillStyle = '#1d4ed8';
  ctx.beginPath();
  ctx.ellipse(0, -28, 16, 8, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-16, -32, 32, 6);
  // Brim
  ctx.fillStyle = '#1e40af';
  ctx.beginPath();
  ctx.ellipse(0, -26, 20, 5, 0, 0, Math.PI);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1e293b';
  ctx.beginPath(); ctx.arc(5, -20, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(6, -21, 1.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawGolfer(g) {
  ctx.save();
  ctx.translate(g.x, g.y);
  ctx.scale(g.facing, 1);

  const isStunned = g.state === 'stunned' || g.state === 'grabbed';
  const flashing = g.hitFlash > 0 && Math.floor(g.hitFlash / 3) % 2 === 0;
  if (flashing) ctx.globalAlpha = 0.4;

  const col = g.color;
  const walk = isStunned ? 0 : Math.sin(g.walkFrame) * 7;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, 44, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (plaid-ish pants)
  ctx.strokeStyle = col.pants;
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  if (isStunned) {
    // Floppy stance
    ctx.beginPath(); ctx.moveTo(-5, 18); ctx.lineTo(-14, 44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5, 18); ctx.lineTo(2, 44); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-5, 18); ctx.lineTo(-7 + walk, 44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5, 18); ctx.lineTo(7 - walk, 44); ctx.stroke();
  }

  // Shoes
  ctx.fillStyle = '#78350f';
  ctx.beginPath();
  if (isStunned) {
    ctx.ellipse(-14, 44, 9, 5, -0.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(2, 44, 9, 5, 0.3, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.ellipse(-7 + walk, 44, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7 - walk, 44, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Body - plaid shirt
  ctx.fillStyle = col.shirt;
  ctx.beginPath();
  ctx.roundRect(-12, -8, 24, 28, 5);
  ctx.fill();
  // Plaid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-12, 2); ctx.lineTo(12, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12, 12); ctx.lineTo(12, 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4, -8); ctx.lineTo(-4, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, -8); ctx.lineTo(4, 20); ctx.stroke();

  // Golf club arm (if patrolling)
  if (!isStunned) {
    ctx.strokeStyle = '#92400e';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(10, 2);
    ctx.lineTo(20, 30);
    ctx.lineTo(24, 44);
    ctx.stroke();
    // Club head
    ctx.fillStyle = '#6b7280';
    ctx.beginPath();
    ctx.ellipse(24, 44, 7, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Arms up / flopped
    ctx.strokeStyle = '#fde68a';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-20, -12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(20, -10); ctx.stroke();
  }

  // Head
  ctx.fillStyle = '#fde68a';
  ctx.beginPath();
  ctx.arc(0, -20, 13, 0, Math.PI * 2);
  ctx.fill();

  if (isStunned) {
    // X eyes
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-6,-24); ctx.lineTo(-3,-21); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3,-24); ctx.lineTo(-6,-21); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-24); ctx.lineTo(6,-21); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6,-24); ctx.lineTo(3,-21); ctx.stroke();
    // Stars
    for (let i = 0; i < 3; i++) {
      const angle = (frame * 0.07 + i * Math.PI * 2 / 3);
      const sx = Math.cos(angle) * 18;
      const sy = Math.sin(angle) * 14 - 28;
      drawStar(sx, sy, 5);
    }
  } else {
    // Normal eyes
    ctx.fillStyle = '#1e293b';
    ctx.beginPath(); ctx.arc(5, -21, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(6, -22, 1.2, 0, Math.PI * 2); ctx.fill();
    // Mouth
    ctx.strokeStyle = '#92400e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -16, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  // Cap
  ctx.fillStyle = col.cap;
  ctx.beginPath();
  ctx.ellipse(0, -28, 15, 7, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-15, -32, 30, 6);
  // Brim
  ctx.fillStyle = '#ca8a04';
  ctx.beginPath();
  ctx.ellipse(8, -26, 14, 4, 0.1, 0, Math.PI);
  ctx.fill();

  ctx.restore();
}

function drawStar(x, y, r) {
  ctx.save();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const b = (i * 4 * Math.PI / 5 + 2 * Math.PI / 5) - Math.PI / 2;
    if (i === 0) ctx.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    else ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    ctx.lineTo(x + Math.cos(b) * r * 0.4, y + Math.sin(b) * r * 0.4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawClaw(cl, g) {
  const armX = cl.armX;
  const armY = cl.armY;

  ctx.save();

  // Arm cable from top
  ctx.strokeStyle = '#6b7280';
  ctx.lineWidth = 5;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(armX, 0);
  ctx.lineTo(armX, armY - 20);
  ctx.stroke();
  ctx.setLineDash([]);

  // Mechanical arm body
  ctx.fillStyle = '#374151';
  ctx.fillRect(armX - 14, armY - 40, 28, 24);
  ctx.fillStyle = '#4b5563';
  ctx.fillRect(armX - 10, armY - 38, 20, 10);
  // Bolts
  ctx.fillStyle = '#9ca3af';
  ctx.beginPath(); ctx.arc(armX - 7, armY - 34, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(armX + 7, armY - 34, 3, 0, Math.PI * 2); ctx.fill();

  // Claw fingers
  const clawOpen = cl.phase === 'grab' ? Math.max(0, (20 - cl.timer) / 20) : (cl.phase === 'ascend' ? 0 : 1);
  const spread = clawOpen * 18;
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  // Left finger
  ctx.beginPath();
  ctx.moveTo(armX - 5, armY - 18);
  ctx.lineTo(armX - 8 - spread, armY - 2);
  ctx.lineTo(armX - 5 - spread, armY + 14);
  ctx.stroke();
  // Right finger
  ctx.beginPath();
  ctx.moveTo(armX + 5, armY - 18);
  ctx.lineTo(armX + 8 + spread, armY - 2);
  ctx.lineTo(armX + 5 + spread, armY + 14);
  ctx.stroke();
  // Middle finger
  ctx.beginPath();
  ctx.moveTo(armX, armY - 18);
  ctx.lineTo(armX, armY + 14);
  ctx.stroke();

  // Highlight screws on arm
  ctx.fillStyle = '#9ca3af';
  ctx.beginPath(); ctx.arc(armX - 5, armY - 18, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(armX + 5, armY - 18, 4, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawHUD() {
  // Score
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(14, 14, 160, 44, 8);
  ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 15px "Courier New", monospace';
  ctx.fillText('SCORE', 26, 34);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Courier New", monospace';
  ctx.fillText(String(score).padStart(4, '0'), 26, 52);
  ctx.restore();

  // HP bar
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(W - 180, 14, 166, 44, 8);
  ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 15px "Courier New", monospace';
  ctx.fillText('HEALTH', W - 168, 34);
  // Bar background
  ctx.fillStyle = '#374151';
  ctx.beginPath();
  ctx.roundRect(W - 168, 40, 140, 12, 4);
  ctx.fill();
  // Bar fill
  const hpFrac = Math.max(0, player.hp / PLAYER_MAX_HP);
  const hpCol = hpFrac > 0.6 ? '#4ade80' : hpFrac > 0.3 ? '#fbbf24' : '#ef4444';
  if (hpFrac > 0) {
    ctx.fillStyle = hpCol;
    ctx.beginPath();
    ctx.roundRect(W - 168, 40, 140 * hpFrac, 12, 4);
    ctx.fill();
  }
  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 200, H / 2 - 130, 400, 260, 18);
  ctx.fill();
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 46px "Courier New", monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 70);

  ctx.fillStyle = '#94a3b8';
  ctx.font = '18px "Courier New", monospace';
  ctx.fillText('GOLFERS CAPTURED', W / 2, H / 2 - 30);

  ctx.fillStyle = '#fbbf24';
  ctx.font = 'bold 38px "Courier New", monospace';
  ctx.fillText(String(score).padStart(4, '0'), W / 2, H / 2 + 18);

  // Restart button
  const bx = W / 2 - 90, by = H / 2 + 50, bw = 180, bh = 48;
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.fillText('PLAY AGAIN', W / 2, by + 31);

  ctx.restore();

  // Store button bounds for click
  canvas._restartBtn = { x: W / 2 - 90, y: H / 2 + 50, w: 180, h: 48 };
}

// ─── Click handler for restart ────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (!gameOver) return;
  const btn = canvas._restartBtn;
  if (!btn) return;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
    initGame();
    showHint();
  }
});

// ─── Hint fade ───────────────────────────────────────────────────────────────
const hint = document.getElementById('hint');
let hintTimeout = setTimeout(() => { hint.style.transition = 'opacity 1s'; hint.style.opacity = '0'; }, 5000);
function hideHint() { hint.style.opacity = '0'; }
function showHint() {
  hint.style.transition = '';
  hint.style.opacity = '1';
  clearTimeout(hintTimeout);
  hintTimeout = setTimeout(() => { hint.style.transition = 'opacity 1s'; hint.style.opacity = '0'; }, 5000);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function dist(ax, ay, bx, by) {
  return Math.hypot(ax - bx, ay - by);
}

// ─── Game Loop ───────────────────────────────────────────────────────────────
initGame();

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
